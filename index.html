<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOnon Cafe - Menu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #e67e22; padding-bottom: 10px; }
        .category { background: #e67e22; color: white; padding: 10px; border-radius: 5px; margin-top: 20px; text-align: left; font-size: 1.2em; }
        .item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; align-items: center; }
        .item-info { text-align: left; }
        .item-name { font-weight: bold; font-size: 1.1em; color: #2c3e50; }
        .item-desc { font-size: 0.9em; color: #7f8c8d; margin-top: 4px; }
        .item-price { font-weight: bold; color: #e67e22; font-size: 1.1em; }
        .logo { max-width: 150px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TOnon Cafe</h1>
    
    <div class="category">Καφέδες & Ροθήματα</div>
    
    <div class="item">
        <div class="item-info">
            <div class="item-name">Φρέντο Εσπρέσο</div>
            <div class="item-desc">Διπλή δόση espresso με πάγο</div>
        </div>
        <div class="item-price">2.50€</div>
    </div>

    <div class="item">
        <div class="item-info">
            <div class="item-name">Φρέντο Καπουτσίνο</div>
            <div class="item-desc">Με πλούσιο κρύο αφρόγαλα</div>
        </div>
        <div class="item-price">3.00€</div>
    </div>

    <div class="category">Αναψυκτικά</div>

    <div class="item">
        <div class="item-info">
            <div class="item-name">Coca Cola 330ml</div>
            <div class="item-desc">Κλασική / Zero / Light</div>
        </div>
        <div class="item-price">2.00€</div>
    </div>

    </div>

</body>
</html>
