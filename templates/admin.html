<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Προσθήκη Προϊόντος</title>
    <style>
        body { font-family: sans-serif; background: #eaeff2; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>Νέο Προϊόν</h2>
    <form method="POST">
        <select name="category" required>
            <option value="Καφέδες-Ροφήματα">Καφέδες-Ροφήματα</option>
            <option value="Αναψυκτικά">Αναψυκτικά</option>
            <option value="Χυμοί">Χυμοί</option>
            <option value="Τσάι">Τσάι</option>
            <option value="Μπύρες(Φιάλη)">Μπύρες(Φιάλη)</option>
            <option value="Μπύρα(Βαρέλι)">Μπύρα(Βαρέλι)</option>
            <option value="Κρασί">Κρασί</option>
            <option value="Αλκοολούχα Ποτά">Αλκοολούχα Ποτά</option>
            <option value="Φαγητά">Φαγητά</option>
        </select>
        <input type="text" name="name" placeholder="Όνομα" required>
        <input type="number" step="0.01" name="price" placeholder="Τιμή" required>
        <textarea name="description" placeholder="Περιγραφή"></textarea>
        <input type="url" name="image_url" placeholder="URL Εικόνας">
        <button type="submit">Αποθήκευση</button>
    </form>
    <p style="text-align:center;"><a href="/dashboard">Πίσω στο Dashboard</a></p>
</div>
</body>
</html>
